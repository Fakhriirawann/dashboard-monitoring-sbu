<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard Monitoring Connect - Dark Theme</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <style>
      /* ================= TEMA DARK PERMANEN ================= */
      :root {
        --bg-body: #0a0f1c;
        --card-bg: #131b2f;
        --text-main: #ffffff;
        --text-muted: #8b949e;
        --border-color: #2a3441;
        --sidebar-hover: rgba(255, 255, 255, 0.05);
        --sidebar-active-bg: rgba(59, 130, 246, 0.1);
        --th-bg: rgba(0, 0, 0, 0.2);
        --tr-hover: rgba(255, 255, 255, 0.05);

        --color-total: #ffffff;
        --color-onair: #10b981;
        --color-open: #3b82f6;
        --color-drop: #ef4444;
        --color-kendala: #f59e0b;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Inter", sans-serif;
      }

      body {
        background-color: var(--bg-body);
        color: var(--text-main);
        display: flex;
        height: 100vh;
        overflow: hidden;
      }

      /* --- SIDEBAR --- */
      .sidebar {
        width: 250px;
        background-color: var(--card-bg);
        border-right: 1px solid var(--border-color);
        display: flex;
        flex-direction: column;
        flex-shrink: 0;
      }

      .brand {
        padding: 30px 15px;
        border-bottom: 1px solid var(--border-color);
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .menu-list {
        list-style: none;
        padding: 15px 0;
        overflow-y: auto;
      }

      .menu-title {
        font-size: 0.75rem;
        color: var(--text-muted);
        font-weight: 600;
        padding: 10px 20px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .menu-item {
        padding: 12px 20px;
        display: flex;
        align-items: center;
        gap: 12px;
        color: var(--text-muted);
        cursor: pointer;
        font-size: 0.85rem;
        font-weight: 500;
        transition: 0.2s;
      }

      .menu-item:hover {
        color: var(--text-main);
        background-color: var(--sidebar-hover);
      }

      .menu-item.active {
        background-color: var(--sidebar-active-bg);
        color: var(--color-open);
        border-right: 3px solid var(--color-open);
      }

      .menu-item.sub-item {
        padding-left: 45px;
      }

      /* --- MAIN CONTENT --- */
      .main-wrapper {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow-y: auto;
        padding: 20px;
        gap: 20px;
      }

      .header-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        padding: 15px 25px; /* Memberikan ruang agar lebih rapi */

        /* Ini adalah efek gradasi warnanya (Biru Navy ke Biru Terang) */
        background: linear-gradient(90deg, var(--card-bg) 0%, #1e2c4a 100%);

        border-radius: 8px;
        border: 1px solid var(--border-color);
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15); /* Efek bayangan */
      }

      .page-title {
        font-size: 1.8rem;
        font-weight: 800;
        color: #ffffff;
        letter-spacing: 2px;
        text-transform: uppercase;
        /* Efek Cahaya / Glow bergaya Cyber/Tech */
        text-shadow:
          0 0 10px rgba(59, 130, 246, 0.8),
          0 0 20px rgba(16, 185, 129, 0.6);
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .header-actions {
        display: flex;
        gap: 10px;
      }

      .btn-action {
        background: var(--card-bg);
        color: var(--text-main);
        border: 1px solid var(--border-color);
        padding: 8px 16px;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
        font-size: 0.8rem;
        display: flex;
        align-items: center;
        gap: 8px;
        transition: 0.2s;
      }

      .btn-action:hover {
        background: var(--sidebar-hover);
      }
      .btn-primary {
        background: var(--color-open);
        color: white;
        border: none;
      }
      .btn-primary:hover {
        background: #2563eb;
      }

      /* --- KPI CARDS ROW --- */
      .kpi-grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 15px;
      }

      .kpi-card {
        background: var(--card-bg);
        border-radius: 6px;
        padding: 20px;
        border: 1px solid var(--border-color);
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .kpi-card.b-total {
        border-top: 3px solid var(--color-total);
      }
      .kpi-card.b-onair {
        border-top: 3px solid var(--color-onair);
      }
      .kpi-card.b-open {
        border-top: 3px solid var(--color-open);
      }
      .kpi-card.b-drop {
        border-top: 3px solid var(--color-drop);
      }
      .kpi-card.b-kendala {
        border-top: 3px solid var(--color-kendala);
      }

      .kpi-title {
        font-size: 0.8rem;
        font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase;
      }
      .kpi-value {
        font-size: 2.5rem;
        font-weight: 700;
      }

      /* --- CHARTS ROW --- */
      .chart-grid {
        display: grid;
        grid-template-columns: 1fr 2fr;
        gap: 20px;
      }

      .card {
        background: var(--card-bg);
        border-radius: 8px;
        padding: 20px;
        border: 1px solid var(--border-color);
        display: flex;
        flex-direction: column;
      }

      .card-title {
        font-size: 0.85rem;
        font-weight: 600;
        color: var(--text-main);
        text-transform: uppercase;
        margin-bottom: 15px;
      }

      .chart-container {
        position: relative;
        flex: 1;
        min-height: 280px;
        width: 100%;
      }

      /* --- TABLE ROW --- */
      .table-container {
        overflow-x: auto;
        max-height: 350px;
        background: var(--card-bg);
        border: 1px solid var(--border-color);
        border-radius: 8px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.75rem;
      }
      th,
      td {
        padding: 12px 15px;
        text-align: left;
        border-bottom: 1px solid var(--border-color);
        white-space: nowrap;
      }
      th {
        /* Ubah background-color menjadi warna solid yang pekat */
        background-color: #0d1425;
        color: var(--text-muted);
        font-weight: 600;
        position: sticky;
        top: 0;
        z-index: 10; /* Naikkan z-index agar selalu berada di paling atas */
        border-bottom: 2px solid var(--border-color); /* Pertegas garis pemisahnya */
      }
      tr:hover {
        background-color: var(--tr-hover);
      }
      /* --- CSS Tambahan untuk Dropdown Filter --- */
      select#filterDistrict {
        background-color: var(--card-bg);
        color: var(--text-main);
      }

      select#filterDistrict option {
        background-color: var(--card-bg);
        color: var(--text-main);
        padding: 10px;
      }
      /* --- CSS Tambahan untuk Filter Tabel --- */
      .table-filters {
        display: flex;
        gap: 15px;
        margin-bottom: 15px;
        align-items: center;
        flex-wrap: wrap;
        padding: 0 20px;
      }

      .search-input {
        flex: 1;
        min-width: 200px;
        padding: 10px 15px;
        border-radius: 6px;
        border: 1px solid var(--border-color);
        background: var(--card-bg);
        color: var(--text-main);
        outline: none;
        font-size: 0.8rem;
      }

      .search-input:focus {
        border-color: var(--color-open);
      }

      /* Memastikan semua opsi dropdown warnanya gelap */
      select.btn-action option {
        background-color: var(--card-bg);
        color: var(--text-main);
      }
    </style>
  </head>
  <body>
    <aside class="sidebar">
      <div class="brand">
        <img
          src="Logo Conncet - Putih.png"
          alt="Logo Connect"
          style="width: 180px; height: auto; object-fit: contain"
        />
      </div>
      <ul class="menu-list" id="sidebarMenu">
        <li class="menu-item">
          <i class="fa-solid fa-spinner fa-spin"></i> Memuat Menu...
        </li>
      </ul>
    </aside>

    <main class="main-wrapper">
      <div class="header-top">
        <div class="page-title" id="bannerTitle">FILTER : SEMUA DATA</div>

        <div class="header-actions" style="align-items: center">
          <!-- Tambahkan Dropdown District ini -->
          <select
            id="filterDistrict"
            class="btn-action"
            style="outline: none; max-width: 200px"
          >
            <option value="All">Semua Distrik</option>
          </select>
          <button
            class="btn-action btn-primary"
            onclick="
              window.open(
                'https://docs.google.com/spreadsheets/d/1KcNQemdjeEdwbUgD1wLKs9X3RDnYzB-h10bSX5ryurk/edit?gid=704502274',
                '_blank',
              )
            "
          >
            <i class="fa-solid fa-table"></i> BUKA DATA
          </button>

          <!-- Logo dengan tambahan efek cahaya (Glow) putih tipis -->
          <img
            src="Logo InfraNexia warna.png"
            alt="Logo InfraNexia"
            style="
              height: 80px;
              margin-left: 15px;
              object-fit: contain;
              filter: drop-shadow(0px 0px 8px rgba(255, 255, 255, 0.25));
            "
          />
        </div>
      </div>

      <div class="kpi-grid">
        <div class="kpi-card b-total">
          <div class="kpi-title">TOTAL PROYEK</div>
          <div
            class="kpi-value"
            id="valTotal"
            style="color: var(--color-total)"
          >
            0
          </div>
        </div>
        <div class="kpi-card b-onair">
          <div class="kpi-title">ON AIR / CLOSED</div>
          <div
            class="kpi-value"
            id="valOnAir"
            style="color: var(--color-onair)"
          >
            0
          </div>
        </div>
        <div class="kpi-card b-open">
          <div class="kpi-title">OPEN</div>
          <div class="kpi-value" id="valOpen" style="color: var(--color-open)">
            0
          </div>
        </div>
        <div class="kpi-card b-drop">
          <div class="kpi-title">DROP</div>
          <div class="kpi-value" id="valDrop" style="color: var(--color-drop)">
            0
          </div>
        </div>
        <div class="kpi-card b-kendala">
          <div class="kpi-title">KENDALA</div>
          <div
            class="kpi-value"
            id="valKendala"
            style="color: var(--color-kendala)"
          >
            0
          </div>
        </div>
      </div>

      <div class="chart-grid">
        <div class="card">
          <div class="card-title">STATUS LAPANGAN</div>
          <div class="chart-container"><canvas id="donutChart"></canvas></div>
        </div>
        <div class="card">
          <div class="card-title">DISTRIBUSI DISTRICT</div>
          <div class="chart-container"><canvas id="mainBarChart"></canvas></div>
        </div>
      </div>
      <!-- Tambahkan Chart Baru Ini -->
      <!-- Split Screen: Progres Lapangan (Lebar) & Kategori SLA (Sedang) -->
            <div class="chart-grid" style="grid-template-columns: 1.8fr 1fr; gap: 20px; margin-top: 20px;">
                
                <!-- Kiri: Progres Lapangan (Porsi lebih lebar) -->
                <div class="card">
                    <div class="card-title">PROGRES LAPANGAN</div>
                    <div class="chart-container" style="min-height: 350px;">
                        <canvas id="progresChart"></canvas>
                    </div>
                </div>

                <!-- Kanan: Kategori SLA (ON) (Porsi sedang) -->
                <div class="card">
                    <div class="card-title">KATEGORI SLA (STATUS ON)</div>
                    <div class="chart-container" style="min-height: 350px;">
                        <canvas id="slaChart"></canvas>
                    </div>
                </div>

            </div>
      <div class="card" style="padding: 0; border: none">
        <div
          id="loadingIndicator"
          style="text-align: center; color: var(--text-muted); padding: 20px"
        >
          <i class="fa-solid fa-spinner fa-spin"></i> Sinkronisasi Data
          Spreadsheet...
        </div>
        <div class="table-filters">
        <select id="searchColumn" class="btn-action" onchange="applyFilters()" style="outline: none; flex: 0.5; min-width: 130px;">
                    <option value="SITE ID">SITE ID</option>
                    <option value="SITE NAME">SITE NAME</option>
                    <option value="STO">STO</option>
                    <option value="MITRA">MITRA</option>
                    <option value="DETAIL PROGRES">DETAIL PROGRES</option>
                </select>
                
                <input type="text" id="searchSiteId" class="search-input" oninput="applyFilters()" placeholder="Ketik pencarian di sini...">
          <select
            id="filterStatusLap"
            class="btn-action"
            style="outline: none; flex: 1; min-width: 150px"
          >
            <option value="ALL">Semua Status Lapangan</option>
          </select>

          <select
            id="filterProgresLap"
            class="btn-action"
            style="outline: none; flex: 1; min-width: 150px"
          >
            <option value="ALL">Semua Progres Lapangan</option>
          </select>

          <select
            id="filterSubProgresLap"
            class="btn-action"
            style="outline: none; flex: 1; min-width: 150px"
          >
            <option value="ALL">Semua Sub Progres Lapangan</option>
          </select>
        </div>
        <div class="table-container">
          <table id="dataTable" style="display: none">
            <thead id="tableHead"></thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </div>
    </main>

    <script>
      // Setup Awal Tema Chart untuk Dark Mode
      Chart.defaults.color = "#8b949e";
      Chart.defaults.borderColor = "#2A3441";

      const sheetId = "1KcNQemdjeEdwbUgD1wLKs9X3RDnYzB-h10bSX5ryurk";
      const gid = "704502274";
      const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&gid=${gid}`;

      let globalData = [];
      let chartDonut = null;
      let chartBar = null;
      let chartProgres = null;
      let chartSla = null;
      let currentActiveMenu = "Semua Data";

      // ==========================================
      // 1. DATA FETCHING DENGAN AUTO-DETEKSI HEADER
      // ==========================================
      Papa.parse(csvUrl, {
        download: true,
        header: false,
        skipEmptyLines: true,
        complete: function (results) {
          const rawArray = results.data;

          let headerRowIndex = 0;
          for (let i = 0; i < Math.min(10, rawArray.length); i++) {
            if (
              rawArray[i] &&
              (rawArray[i].includes("REGION") ||
                rawArray[i].includes("DISTRICT"))
            ) {
              headerRowIndex = i;
              break;
            }
          }

          const headers = rawArray[headerRowIndex];
          const dataRows = rawArray.slice(headerRowIndex + 1);

          globalData = dataRows.map((row) => {
            let obj = {};
            headers.forEach((head, index) => {
              if (head) obj[head.trim()] = row[index];
            });
            return obj;
          });

          document.getElementById("loadingIndicator").style.display = "none";
          document.getElementById("dataTable").style.display = "table";

          // --- Inisialisasi Dropdown Distrik ---
          // --- Inisialisasi Dropdown Distrik (Tanpa Duplikat Huruf Kecil/Besar) ---
          // Seragamkan semua teks menjadi huruf kapital (toUpperCase) sebelum dimasukkan ke Set
          const rawDistricts = globalData
            .map((item) => (item["DISTRICT"] || "").trim().toUpperCase())
            .filter(Boolean);
          const distrikUnik = [...new Set(rawDistricts)].sort();

          const districtSelect = document.getElementById("filterDistrict");

          if (districtSelect) {
            // Kosongkan opsi lama kecuali "Semua Distrik"
            districtSelect.innerHTML =
              '<option value="ALL">Semua Distrik</option>';

            distrikUnik.forEach((dist) => {
              const opt = document.createElement("option");
              opt.value = dist;
              opt.textContent = dist; // Teks akan tampil KAPITAL semua agar rapi
              districtSelect.appendChild(opt);
            });

            // Event listener untuk dropdown
            districtSelect.addEventListener("change", function () {
              applyFilters();
            });
          }
          // -------------------------------------
          // -------------------------------------

          generateSidebar(globalData);
          populateTableDropdowns(globalData);
          applyFilters(); // Panggil fungsi filter gabungan di awal
        },
        error: function (err) {
          document.getElementById("loadingIndicator").innerHTML =
            `<i class="fa-solid fa-triangle-exclamation" style="color:red;"></i> Gagal memuat data.`;
        },
      });
      // ==========================================
      // FUNGSI GABUNGAN FILTER (REGION, DISTRICT, TABEL)
      // ==========================================
      function applyFilters() {
        let filteredData = globalData;

        // 1. Filter Region (Dari Sidebar)
        if (currentActiveMenu !== "Semua Data") {
          filteredData = filteredData.filter(
            (item) =>
              (item["REGION"] || "").toUpperCase() ===
              currentActiveMenu.toUpperCase(),
          );
        }

        // 2. Filter District (Dari Dropdown Kanan Atas)
        const districtSelect = document.getElementById("filterDistrict");
        if (districtSelect && districtSelect.value.toUpperCase() !== "ALL") {
          filteredData = filteredData.filter(
            (item) =>
              (item["DISTRICT"] || "").trim().toUpperCase() ===
              districtSelect.value.toUpperCase(),
          );
        }
        // 3. Search SITE ID (Pencarian Teks)
        const searchSite = document.getElementById("searchSiteId");
        if (searchSite && searchSite.value.trim() !== "") {
          const query = searchSite.value.trim().toUpperCase();
          filteredData = filteredData.filter((item) => {
            // Mengambil data dari kolom 'SITE ID' ATAU 'SITEID' (tanpa spasi)
            const siteIdValue = (item["SITE ID"] || item["SITEID"] || "")
              .toString()
              .toUpperCase();
            return siteIdValue.includes(query);
          });
        }

        // 4. Filter Status Lapangan
        const statusSelect = document.getElementById("filterStatusLap");
        if (statusSelect && statusSelect.value.toUpperCase() !== "ALL") {
          filteredData = filteredData.filter(
            (item) =>
              (item["Status Lapangan"] || "").trim().toUpperCase() ===
              statusSelect.value.toUpperCase(),
          );
        }

        // 5. Filter Progres Lapangan
        const progresSelect = document.getElementById("filterProgresLap");
        if (progresSelect && progresSelect.value.toUpperCase() !== "ALL") {
          filteredData = filteredData.filter(
            (item) =>
              (item["PROGRES LAPANGAN"] || "").trim().toUpperCase() ===
              progresSelect.value.toUpperCase(),
          );
        }

        // 6. Filter Sub Progres Lapangan
        const subProgresSelect = document.getElementById("filterSubProgresLap");
        if (
          subProgresSelect &&
          subProgresSelect.value.toUpperCase() !== "ALL"
        ) {
          filteredData = filteredData.filter((item) => {
            const subProg = (
              item["SUB PROGRES LAPANGAN"] ||
              item["Sub Progres Lapangan"] ||
              ""
            )
              .trim()
              .toUpperCase();
            return subProg === subProgresSelect.value.toUpperCase();
          });
        }
        // 2. Search Teks Berdasarkan Kolom Spesifik (Ultra-Aman)
          const searchInput = document.getElementById('searchSiteId');
          const searchColumn = document.getElementById('searchColumn');

          // Pastikan elemen ada dan input tidak kosong
          if (searchInput && searchColumn && searchInput.value.trim() !== "") {
              const query = searchInput.value.trim().toUpperCase();
              const selectedCol = searchColumn.value.trim().toUpperCase();

              filteredData = filteredData.filter(item => {
                  let isMatch = false;
                  
                  // Periksa semua nama kolom di baris data ini satu per satu
                  for (let key in item) {
                      let cleanKey = key.trim().toUpperCase();
                      
                      // Cek apakah nama kolom ini sama dengan yang dipilih pengguna di dropdown
                      let isTargetColumn = false;
                      if (selectedCol === "SITE ID") {
                          isTargetColumn = (cleanKey === "SITE ID" || cleanKey === "SITEID");
                      } else if (selectedCol === "DETAIL PROGRES") {
                          isTargetColumn = (cleanKey === "DETAIL PROGRES" || cleanKey === "DETAIL PROGRESS");
                      } else {
                          isTargetColumn = (cleanKey === selectedCol);
                      }

                      // Jika kolom sasarannya ketemu, periksa teks di dalamnya
                      if (isTargetColumn) {
                          let cellValue = item[key];
                          // Pastikan sel tersebut ada isinya (tidak null/undefined)
                          if (cellValue !== null && cellValue !== undefined) {
                              if (cellValue.toString().toUpperCase().includes(query)) {
                                  isMatch = true;
                              }
                          }
                          break; // Hentikan pengecekan kolom lain karena sudah ketemu
                      }
                  }
                  
                  return isMatch;
              });
          }

        // Render ulang dashboard dengan data yang sudah disaring berlapis
        updateDashboard(filteredData, currentActiveMenu);
      }

      // ==========================================
      // FUNGSI UNTUK MENGISI DROPDOWN TABEL OTOMATIS
      // ==========================================
      function populateTableDropdowns(data) {
        function fillDropdown(columnKey, elementId, defaultText) {
          const rawValues = data
            .map((item) =>
              (
                item[columnKey] ||
                item[columnKey.toUpperCase()] ||
                item[columnKey.toLowerCase()] ||
                ""
              )
                .trim()
                .toUpperCase(),
            )
            .filter(Boolean);
          const uniqueValues = [...new Set(rawValues)].sort();
          const selectEl = document.getElementById(elementId);

          if (selectEl) {
            selectEl.innerHTML = `<option value="ALL">${defaultText}</option>`;
            uniqueValues.forEach((val) => {
              const opt = document.createElement("option");
              opt.value = val;
              opt.textContent = val;
              selectEl.appendChild(opt);
            });
            // Tambahkan event listener agar saat dipilih langsung memfilter
            selectEl.addEventListener("change", applyFilters);
          }
        }

        fillDropdown(
          "Status Lapangan",
          "filterStatusLap",
          "Semua Status Lapangan",
        );
        fillDropdown(
          "PROGRES LAPANGAN",
          "filterProgresLap",
          "Semua Progres Lapangan",
        );
        fillDropdown(
          "SUB PROGRES LAPANGAN",
          "filterSubProgresLap",
          "Semua Sub Progres Lapangan",
        );

        // 2. Search Teks Berdasarkan Kolom Spesifik
          const searchInput = document.getElementById('searchSiteId');
          const searchColumn = document.getElementById('searchColumn');

          if (searchInput) {
              searchInput.addEventListener('input', applyFilters);
          }
          if (searchColumn) {
              searchColumn.addEventListener('change', applyFilters);
          }
      }

      // ==========================================
      // 2. GENERATE SIDEBAR & MENU
      // ==========================================
      // ==========================================
      // 2. GENERATE SIDEBAR & MENU
      // ==========================================
      function generateSidebar() {
        const menuList = document.getElementById("sidebarMenu");

        // Menampilkan menu NODE-B beserta menu placeholder lainnya
        menuList.innerHTML = `
            <li class="menu-item active" id="menu-nodeb"><i class="fa-solid fa-network-wired"></i> NODE-B</li>
            <li class="menu-item" id="menu-hemsbu"><i class="fa-solid fa-server"></i> HEM SBU</li>
            <li class="menu-item" id="menu-olosbu"><i class="fa-solid fa-project-diagram"></i> OLO SBU</li>
            <li class="menu-item" id="menu-jpp"><i class="fa-solid fa-building"></i> JPP PT3/PT4</li>
        `;

        // 1. Logika untuk Menu NODE-B (Menampilkan Data Utama)
        document
          .getElementById("menu-nodeb")
          .addEventListener("click", function () {
            setActiveMenu(this);
            applyFilters(); // Memanggil data dari Google Sheets
          });

        // 2. Logika untuk Menu Lainnya (Dikosongkan Sementara)
        const menuKosong = ["menu-hemsbu", "menu-olosbu", "menu-jpp"];
        menuKosong.forEach((id) => {
          document.getElementById(id).addEventListener("click", function () {
            setActiveMenu(this);
            // Mengirimkan array kosong [] agar tabel dan grafik dibersihkan
            updateDashboard([]);
          });
        });
      }
      function setActiveMenu(clickedElement) {
        document
          .querySelectorAll(".menu-item")
          .forEach((el) => el.classList.remove("active"));
        clickedElement.classList.add("active");
      }

      // ==========================================
      // 3. UPDATE KESELURUHAN (KPI & TABEL)
      // ==========================================
      function updateDashboard(dataToRender, title) {
        document.getElementById("bannerTitle").innerHTML =
          `<i class="fa-solid fa-satellite-dish"></i> ED SUMBAGUT`;

        let countOnAir = 0,
          countOpen = 0,
          countDrop = 0,
          countKendala = 0;

        dataToRender.forEach((item) => {
          const statusLap = (item["Status Lapangan"] || "").toUpperCase();
          const progLap = (item["PROGRES LAPANGAN"] || "").toUpperCase();

          if (
            statusLap.includes("GOLIVE") ||
            progLap.includes("ON AIR") ||
            statusLap.includes("CLOSED") ||
            progLap.includes("DONE")
          ) {
            countOnAir++;
          } else if (statusLap.includes("DROP") || progLap.includes("DROP")) {
            countDrop++;
          } else if (
            statusLap.includes("KENDALA") ||
            progLap.includes("REDESIGN") ||
            statusLap.includes("HOLD") ||
            progLap.includes("ISSUE")
          ) {
            countKendala++;
          } else {
            countOpen++;
          }
        });

        document.getElementById("valTotal").textContent = dataToRender.length;
        document.getElementById("valOnAir").textContent = countOnAir;
        document.getElementById("valOpen").textContent = countOpen;
        document.getElementById("valDrop").textContent = countDrop;
        document.getElementById("valKendala").textContent = countKendala;

        renderTable(dataToRender);
        renderCharts(
          dataToRender,
          countOnAir,
          countOpen,
          countDrop,
          countKendala,
        );
      }

      function renderTable(data) {
        const tableHead = document.getElementById("tableHead");
        const tableBody = document.getElementById("tableBody");
        tableHead.innerHTML = "";
        tableBody.innerHTML = "";

        if (data.length === 0) return;

        // 1. Tentukan kolom spesifik yang hanya ingin ditampilkan
        const desiredHeaders = [
          "NO",
          "SITE ID",
          "STO",
          "SITE NAME",
          "MITRA",
          "Status Lapangan",
          "PROGRES LAPANGAN",
          "SUB PROGRES LAPANGAN",
          "KOMITMEN GO-LIVE",
          "DETAIL PROGRES", // Disesuaikan dengan ejaan dari data spreadsheetmu
        ];

        // 2. Render Header (Judul Kolom)
        const trHead = document.createElement("tr");
        desiredHeaders.forEach((header) => {
          const th = document.createElement("th");
          th.textContent = header;
          trHead.appendChild(th);
        });
        tableHead.appendChild(trHead);

        // 3. Render Isi Tabel
        data.forEach((row) => {
          const tr = document.createElement("tr");
          desiredHeaders.forEach((header) => {
            const td = document.createElement("td");
            
            let cellValue = "-";

            // Tangkap data khusus untuk kolom Komitmen Go-Live (berjaga-jaga jika ejaannya beda di Excel)
            if (header === "KOMITMEN GO-LIVE") {
                // Cek berbagai kemungkinan nama judul di baris pertama kolom AN Excel-mu
                cellValue = row["KOMITMEN GO-LIVE"] || 
                            row["KOMITMEN GOLIVE"] || 
                            row["TGL TGT OA"] || // (Berdasarkan gambar Excel-mu sebelumnya, kolom AN bernama ini)
                            row["Komitmen Golive"] || 
                            "-";
            } else {
                // Untuk kolom lainnya, gunakan logika standar
                cellValue = row[header] || 
                            row[header.toUpperCase()] || 
                            row[header.replace(" ", "")] || 
                            row["Detail Progress"] || 
                            "-";
            }
            
            td.textContent = cellValue;
            tr.appendChild(td);
          });
          tableBody.appendChild(tr);
        });
      }

      // ==========================================
      // 4. RENDER CHART
      // ==========================================
      function renderCharts(data, onAir, open, drop, kendala) {
        if (chartDonut) chartDonut.destroy();
        if (chartBar) chartBar.destroy();
        if (chartProgres) chartProgres.destroy(); // Hancurkan chart progres lama

        // Warna statis untuk Dark Mode
        const textColor = "#8b949e";
        const gridColor = "#2A3441";

        // 1. Chart Donut
        const ctxDonut = document.getElementById("donutChart").getContext("2d");
        chartDonut = new Chart(ctxDonut, {
          type: "doughnut",
          data: {
            labels: ["ON AIR/CLOSED", "OPEN", "KENDALA", "DROP"],
            datasets: [
              {
                data: [onAir, open, kendala, drop],
                backgroundColor: ["#10B981", "#3B82F6", "#F59E0B", "#EF4444"],
                borderWidth: 0,
                cutout: "65%",
              },
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: {
                position: "bottom",
                labels: { usePointStyle: true, color: textColor },
              },
            },
          },
        });

        // 2. Chart Bar (Distribusi District)
        const districtData = {};
        data.forEach((item) => {
          const district = (item["DISTRICT"] || "Uncategorized")
            .trim()
            .toUpperCase();
          const statusLap = (item["Status Lapangan"] || "").toUpperCase();
          const progLap = (item["PROGRES LAPANGAN"] || "").toUpperCase();

          if (district === "") return;
          if (!districtData[district])
            districtData[district] = { onair: 0, open: 0, kendala: 0, drop: 0 };

          if (
            statusLap.includes("GOLIVE") ||
            progLap.includes("ON AIR") ||
            statusLap.includes("CLOSED")
          ) {
            districtData[district].onair++;
          } else if (statusLap.includes("DROP") || progLap.includes("DROP")) {
            districtData[district].drop++;
          } else if (
            statusLap.includes("KENDALA") ||
            progLap.includes("REDESIGN") ||
            statusLap.includes("HOLD") ||
            progLap.includes("ISSUE")
          ) {
            districtData[district].kendala++;
          } else {
            districtData[district].open++;
          }
        });

        const labelsDistrict = Object.keys(districtData);

        const ctxBar = document.getElementById("mainBarChart").getContext("2d");
        chartBar = new Chart(ctxBar, {
          type: "bar",
          data: {
            labels: labelsDistrict,
            datasets: [
              {
                label: "CLOSED",
                data: labelsDistrict.map((d) => districtData[d].onair),
                backgroundColor: "#10B981",
              },
              {
                label: "OPEN",
                data: labelsDistrict.map((d) => districtData[d].open),
                backgroundColor: "#3B82F6",
              },
              {
                label: "KENDALA",
                data: labelsDistrict.map((d) => districtData[d].kendala),
                backgroundColor: "#F59E0B",
              },
              {
                label: "DROP",
                data: labelsDistrict.map((d) => districtData[d].drop),
                backgroundColor: "#EF4444",
              },
            ],
          },
          options: {
            indexAxis: "y",
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: {
                position: "top",
                labels: { usePointStyle: true, color: textColor },
              },
            },
            scales: {
              x: {
                stacked: true,
                grid: { color: gridColor },
                ticks: { color: textColor },
              },
              y: {
                stacked: true,
                grid: { display: false },
                ticks: { color: textColor },
              },
            },
          },
        });

        // 3. Chart Progres Lapangan (Baru)
        const progresData = {};
        data.forEach((item) => {
          const prog = (
            item["PROGRES LAPANGAN"] || "KOSONG / TIDAK ADA DATA"
          ).trim();
          if (prog !== "") {
            progresData[prog] = (progresData[prog] || 0) + 1;
          }
        });

        const ctxProgres = document.getElementById("progresChart");
        // Pastikan elemen canvasnya ada sebelum membuat chart
        if (ctxProgres) {
          chartProgres = new Chart(ctxProgres.getContext("2d"), {
            type: "bar",
            data: {
              labels: Object.keys(progresData),
              datasets: [
                {
                  label: "Jumlah Site",
                  data: Object.values(progresData),
                  backgroundColor: "#8B5CF6", // Warna Ungu
                  borderRadius: 4,
                },
              ],
            },
            options: {
              indexAxis: "y",
              responsive: true,
              maintainAspectRatio: false,
              plugins: { legend: { display: false } },
              scales: {
                x: {
                  beginAtZero: true,
                  grid: { color: gridColor },
                  ticks: { color: textColor },
                },
                y: { grid: { display: false }, ticks: { color: textColor } },
              },
            },
          });
        }
        // --- 4. Chart Kategori SLA (Khusus Status ON) ---
        if (chartSla) chartSla.destroy();

        const slaData = {};
        data.forEach((item) => {
            const statusLap = (item["Status Lapangan"] || "").toUpperCase();
            const progLap = (item["PROGRES LAPANGAN"] || "").toUpperCase();
            
            // Filter HANYA yang mengandung kata "ON" (misal: "ON AIR")
            if (statusLap.includes("ON") || progLap.includes("ON")) {
                // Ambil data dari kolom KAT SLA
                const katSla = (item["KAT SLA"] || item["KATEGORI SLA"] || "TIDAK ADA DATA").trim();
                if (katSla !== "") {
                    slaData[katSla] = (slaData[katSla] || 0) + 1;
                }
            }
        });

        const ctxSla = document.getElementById("slaChart");
        if (ctxSla) {
            chartSla = new Chart(ctxSla.getContext("2d"), {
                type: "doughnut",
                data: {
                    labels: Object.keys(slaData),
                    datasets: [{
                        data: Object.values(slaData),
                        // Warna-warni cerah yang masuk dengan tema Dark Mode
                        backgroundColor: ["#10B981", "#3B82F6", "#8B5CF6", "#F59E0B", "#EF4444", "#14B8A6", "#EC4899"],
                        borderWidth: 0,
                        cutout: "60%" 
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: "right", // Label di samping agar muat 
                            labels: { usePointStyle: true, color: textColor }
                        }
                    }
                }
            });
        }
      }
    </script>
  </body>
