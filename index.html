<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard Monitoring Connect - Dark Theme</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <style>
      /* ================= TEMA DARK PERMANEN ================= */
      :root {
        --bg-body: #0a0f1c;
        --card-bg: #131b2f;
        --text-main: #ffffff;
        --text-muted: #8b949e;
        --border-color: #2a3441;
        --sidebar-hover: rgba(255, 255, 255, 0.05);
        --sidebar-active-bg: rgba(59, 130, 246, 0.1);
        --th-bg: rgba(0, 0, 0, 0.2);
        --tr-hover: rgba(255, 255, 255, 0.05);

        --color-total: #ffffff;
        --color-onair: #10b981;
        --color-open: #3b82f6;
        --color-drop: #ef4444;
        --color-kendala: #f59e0b;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Inter", sans-serif;
      }

      body {
        background-color: var(--bg-body);
        color: var(--text-main);
        display: flex;
        height: 100vh;
        overflow: hidden;
      }

      /* --- SIDEBAR --- */
      .sidebar {
        width: 250px;
        background-color: var(--card-bg);
        border-right: 1px solid var(--border-color);
        display: flex;
        flex-direction: column;
        flex-shrink: 0;
      }

      .brand {
        padding: 30px 15px;
        border-bottom: 1px solid var(--border-color);
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .menu-list {
        list-style: none;
        padding: 15px 0;
        overflow-y: auto;
      }

      .menu-title {
        font-size: 0.75rem;
        color: var(--text-muted);
        font-weight: 600;
        padding: 10px 20px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .menu-item {
        padding: 12px 20px;
        display: flex;
        align-items: center;
        gap: 12px;
        color: var(--text-muted);
        cursor: pointer;
        font-size: 0.85rem;
        font-weight: 500;
        transition: 0.2s;
      }

      .menu-item:hover {
        color: var(--text-main);
        background-color: var(--sidebar-hover);
      }

      .menu-item.active {
        background-color: var(--sidebar-active-bg);
        color: var(--color-open);
        border-right: 3px solid var(--color-open);
      }

      .menu-item.sub-item {
        padding-left: 45px;
      }

      /* --- MAIN CONTENT --- */
      .main-wrapper {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow-y: auto;
        padding: 20px;
        gap: 20px;
      }

      .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 15px 25px; /* Memberikan ruang agar lebih rapi */
            
            /* Ini adalah efek gradasi warnanya (Biru Navy ke Biru Terang) */
            background: linear-gradient(90deg, var(--card-bg) 0%, #1e2c4a 100%); 
            
            border-radius: 8px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15); /* Efek bayangan */
        }

      .page-title {
        font-size: 1.2rem;
        font-weight: 600;
        color: var(--text-muted);
      }

      .header-actions {
        display: flex;
        gap: 10px;
      }

      .btn-action {
        background: var(--card-bg);
        color: var(--text-main);
        border: 1px solid var(--border-color);
        padding: 8px 16px;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
        font-size: 0.8rem;
        display: flex;
        align-items: center;
        gap: 8px;
        transition: 0.2s;
      }

      .btn-action:hover {
        background: var(--sidebar-hover);
      }
      .btn-primary {
        background: var(--color-open);
        color: white;
        border: none;
      }
      .btn-primary:hover {
        background: #2563eb;
      }

      /* --- KPI CARDS ROW --- */
      .kpi-grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 15px;
      }

      .kpi-card {
        background: var(--card-bg);
        border-radius: 6px;
        padding: 20px;
        border: 1px solid var(--border-color);
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .kpi-card.b-total {
        border-top: 3px solid var(--color-total);
      }
      .kpi-card.b-onair {
        border-top: 3px solid var(--color-onair);
      }
      .kpi-card.b-open {
        border-top: 3px solid var(--color-open);
      }
      .kpi-card.b-drop {
        border-top: 3px solid var(--color-drop);
      }
      .kpi-card.b-kendala {
        border-top: 3px solid var(--color-kendala);
      }

      .kpi-title {
        font-size: 0.8rem;
        font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase;
      }
      .kpi-value {
        font-size: 2.5rem;
        font-weight: 700;
      }

      /* --- CHARTS ROW --- */
      .chart-grid {
        display: grid;
        grid-template-columns: 1fr 2fr;
        gap: 20px;
      }

      .card {
        background: var(--card-bg);
        border-radius: 8px;
        padding: 20px;
        border: 1px solid var(--border-color);
        display: flex;
        flex-direction: column;
      }

      .card-title {
        font-size: 0.85rem;
        font-weight: 600;
        color: var(--text-main);
        text-transform: uppercase;
        margin-bottom: 15px;
      }

      .chart-container {
        position: relative;
        flex: 1;
        min-height: 280px;
        width: 100%;
      }

      /* --- TABLE ROW --- */
      .table-container {
        overflow-x: auto;
        max-height: 350px;
        background: var(--card-bg);
        border: 1px solid var(--border-color);
        border-radius: 8px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.75rem;
      }
      th,
      td {
        padding: 12px 15px;
        text-align: left;
        border-bottom: 1px solid var(--border-color);
        white-space: nowrap;
      }
      th {
        background-color: var(--th-bg);
        color: var(--text-muted);
        font-weight: 600;
        position: sticky;
        top: 0;
        z-index: 1;
      }
      tr:hover {
        background-color: var(--tr-hover);
      }
    </style>
  </head>
  <body>
    <aside class="sidebar">
      <div class="brand">
        <img
          src="Logo Conncet - Putih.png"
          alt="Logo Connect"
          style="width: 180px; height: auto; object-fit: contain"
        />
      </div>
      <ul class="menu-list" id="sidebarMenu">
        <li class="menu-item">
          <i class="fa-solid fa-spinner fa-spin"></i> Memuat Menu...
        </li>
      </ul>
    </aside>

    <main class="main-wrapper">
      <div class="header-top">
        <div class="page-title" id="bannerTitle">FILTER : SEMUA DATA</div>

        <div class="header-actions" style="align-items: center;">
            <button class="btn-action btn-primary" onclick="window.open('https://docs.google.com/spreadsheets/d/1KcNQemdjeEdwbUgD1wLKs9X3RDnYzB-h10bSX5ryurk/edit?gid=704502274', '_blank')">
                <i class="fa-solid fa-table"></i> BUKA DATA
            </button>
            
            <!-- Logo dengan tambahan efek cahaya (Glow) putih tipis -->
            <img src="Logo InfraNexia warna.png" alt="Logo InfraNexia" style="height: 80px; margin-left: 15px; object-fit: contain; filter: drop-shadow(0px 0px 8px rgba(255, 255, 255, 0.25));">
        </div>
      </div>

      <div class="kpi-grid">
        <div class="kpi-card b-total">
          <div class="kpi-title">TOTAL PROYEK</div>
          <div
            class="kpi-value"
            id="valTotal"
            style="color: var(--color-total)"
          >
            0
          </div>
        </div>
        <div class="kpi-card b-onair">
          <div class="kpi-title">ON AIR / CLOSED</div>
          <div
            class="kpi-value"
            id="valOnAir"
            style="color: var(--color-onair)"
          >
            0
          </div>
        </div>
        <div class="kpi-card b-open">
          <div class="kpi-title">OPEN</div>
          <div class="kpi-value" id="valOpen" style="color: var(--color-open)">
            0
          </div>
        </div>
        <div class="kpi-card b-drop">
          <div class="kpi-title">DROP</div>
          <div class="kpi-value" id="valDrop" style="color: var(--color-drop)">
            0
          </div>
        </div>
        <div class="kpi-card b-kendala">
          <div class="kpi-title">KENDALA</div>
          <div
            class="kpi-value"
            id="valKendala"
            style="color: var(--color-kendala)"
          >
            0
          </div>
        </div>
      </div>

      <div class="chart-grid">
        <div class="card">
          <div class="card-title">STATUS LAPANGAN</div>
          <div class="chart-container"><canvas id="donutChart"></canvas></div>
        </div>
        <div class="card">
          <div class="card-title">DISTRIBUSI DISTRICT</div>
          <div class="chart-container"><canvas id="mainBarChart"></canvas></div>
        </div>
      </div>

      <div class="card" style="padding: 0; border: none">
        <div
          id="loadingIndicator"
          style="text-align: center; color: var(--text-muted); padding: 20px"
        >
          <i class="fa-solid fa-spinner fa-spin"></i> Sinkronisasi Data
          Spreadsheet...
        </div>
        <div class="table-container">
          <table id="dataTable" style="display: none">
            <thead id="tableHead"></thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </div>
    </main>

    <script>
      // Setup Awal Tema Chart untuk Dark Mode
      Chart.defaults.color = "#8b949e";
      Chart.defaults.borderColor = "#2A3441";

      const sheetId = "1KcNQemdjeEdwbUgD1wLKs9X3RDnYzB-h10bSX5ryurk";
      const gid = "704502274";
      const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&gid=${gid}`;

      let globalData = [];
      let chartDonut = null;
      let chartBar = null;
      let currentActiveMenu = "Semua Data";

      // ==========================================
      // 1. DATA FETCHING DENGAN AUTO-DETEKSI HEADER
      // ==========================================
      Papa.parse(csvUrl, {
        download: true,
        header: false,
        skipEmptyLines: true,
        complete: function (results) {
          const rawArray = results.data;

          let headerRowIndex = 0;
          for (let i = 0; i < Math.min(10, rawArray.length); i++) {
            if (
              rawArray[i] &&
              (rawArray[i].includes("REGION") ||
                rawArray[i].includes("DISTRICT"))
            ) {
              headerRowIndex = i;
              break;
            }
          }

          const headers = rawArray[headerRowIndex];
          const dataRows = rawArray.slice(headerRowIndex + 1);

          globalData = dataRows.map((row) => {
            let obj = {};
            headers.forEach((head, index) => {
              if (head) obj[head.trim()] = row[index];
            });
            return obj;
          });

          document.getElementById("loadingIndicator").style.display = "none";
          document.getElementById("dataTable").style.display = "table";

          generateSidebar(globalData);
          updateDashboard(globalData, "Semua Data");
        },
        error: function (err) {
          document.getElementById("loadingIndicator").innerHTML =
            `<i class="fa-solid fa-triangle-exclamation" style="color:red;"></i> Gagal memuat data.`;
        },
      });

      // ==========================================
      // 2. GENERATE SIDEBAR & MENU
      // ==========================================
      function generateSidebar(data) {
        const menuList = document.getElementById("sidebarMenu");
        const kolomKategori = "REGION";

        const kategoriUnik = [
          ...new Set(data.map((item) => item[kolomKategori])),
        ].filter(Boolean);

        menuList.innerHTML = `
                <li class="menu-item active" id="menu-all"><i class="fa-solid fa-globe"></i> SEMUA DATA</li>
                <div class="menu-title" style="margin-top: 15px;"><i class="fa-solid fa-location-dot"></i> FILTER ${kolomKategori}</div>
            `;

        document
          .getElementById("menu-all")
          .addEventListener("click", function () {
            setActiveMenu(this);
            currentActiveMenu = "Semua Data";
            updateDashboard(globalData, currentActiveMenu);
          });

        kategoriUnik.forEach((kategori) => {
          const li = document.createElement("li");
          li.className = "menu-item sub-item";
          li.textContent = kategori;

          li.addEventListener("click", function () {
            setActiveMenu(this);
            currentActiveMenu = kategori;
            const filteredData = globalData.filter(
              (item) => item[kolomKategori] === kategori,
            );
            updateDashboard(filteredData, currentActiveMenu);
          });

          menuList.appendChild(li);
        });
      }

      function setActiveMenu(clickedElement) {
        document
          .querySelectorAll(".menu-item")
          .forEach((el) => el.classList.remove("active"));
        clickedElement.classList.add("active");
      }

      // ==========================================
      // 3. UPDATE KESELURUHAN (KPI & TABEL)
      // ==========================================
      function updateDashboard(dataToRender, title) {
        document.getElementById("bannerTitle").textContent =
          `FILTER : ${title.toUpperCase()}`;

        let countOnAir = 0,
          countOpen = 0,
          countDrop = 0,
          countKendala = 0;

        dataToRender.forEach((item) => {
          const statusLap = (item["Status Lapangan"] || "").toUpperCase();
          const progLap = (item["PROGRES LAPANGAN"] || "").toUpperCase();

          if (
            statusLap.includes("GOLIVE") ||
            progLap.includes("ON AIR") ||
            statusLap.includes("CLOSED") ||
            progLap.includes("DONE")
          ) {
            countOnAir++;
          } else if (statusLap.includes("DROP") || progLap.includes("DROP")) {
            countDrop++;
          } else if (
            statusLap.includes("KENDALA") ||
            progLap.includes("REDESIGN") ||
            statusLap.includes("HOLD") ||
            progLap.includes("ISSUE")
          ) {
            countKendala++;
          } else {
            countOpen++;
          }
        });

        document.getElementById("valTotal").textContent = dataToRender.length;
        document.getElementById("valOnAir").textContent = countOnAir;
        document.getElementById("valOpen").textContent = countOpen;
        document.getElementById("valDrop").textContent = countDrop;
        document.getElementById("valKendala").textContent = countKendala;

        renderTable(dataToRender);
        renderCharts(
          dataToRender,
          countOnAir,
          countOpen,
          countDrop,
          countKendala,
        );
      }

      function renderTable(data) {
        const tableHead = document.getElementById("tableHead");
        const tableBody = document.getElementById("tableBody");
        tableHead.innerHTML = "";
        tableBody.innerHTML = "";

        if (data.length === 0) return;

        const headers = Object.keys(data[0]);
        const trHead = document.createElement("tr");
        headers.forEach((header) => {
          const th = document.createElement("th");
          th.textContent = header;
          trHead.appendChild(th);
        });
        tableHead.appendChild(trHead);

        data.forEach((row) => {
          const tr = document.createElement("tr");
          headers.forEach((header) => {
            const td = document.createElement("td");
            td.textContent = row[header] || "-";
            tr.appendChild(td);
          });
          tableBody.appendChild(tr);
        });
      }

      // ==========================================
      // 4. RENDER CHART
      // ==========================================
      function renderCharts(data, onAir, open, drop, kendala) {
        if (chartDonut) chartDonut.destroy();
        if (chartBar) chartBar.destroy();

        // Warna statis untuk Dark Mode
        const textColor = "#8b949e";
        const gridColor = "#2A3441";

        const ctxDonut = document.getElementById("donutChart").getContext("2d");
        chartDonut = new Chart(ctxDonut, {
          type: "doughnut",
          data: {
            labels: ["ON AIR/CLOSED", "OPEN", "KENDALA", "DROP"],
            datasets: [
              {
                data: [onAir, open, kendala, drop],
                backgroundColor: ["#10B981", "#3B82F6", "#F59E0B", "#EF4444"],
                borderWidth: 0,
                cutout: "65%",
              },
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: {
                position: "bottom",
                labels: { usePointStyle: true, color: textColor },
              },
            },
          },
        });

        const districtData = {};
        data.forEach((item) => {
          const district = (item["DISTRICT"] || "Uncategorized").trim();
          const statusLap = (item["Status Lapangan"] || "").toUpperCase();
          const progLap = (item["PROGRES LAPANGAN"] || "").toUpperCase();

          if (district === "") return;
          if (!districtData[district])
            districtData[district] = { onair: 0, open: 0, kendala: 0, drop: 0 };

          if (
            statusLap.includes("GOLIVE") ||
            progLap.includes("ON AIR") ||
            statusLap.includes("CLOSED")
          ) {
            districtData[district].onair++;
          } else if (statusLap.includes("DROP") || progLap.includes("DROP")) {
            districtData[district].drop++;
          } else if (
            statusLap.includes("KENDALA") ||
            progLap.includes("REDESIGN") ||
            statusLap.includes("HOLD") ||
            progLap.includes("ISSUE")
          ) {
            districtData[district].kendala++;
          } else {
            districtData[district].open++;
          }
        });

        const labelsDistrict = Object.keys(districtData);

        const ctxBar = document.getElementById("mainBarChart").getContext("2d");
        chartBar = new Chart(ctxBar, {
          type: "bar",
          data: {
            labels: labelsDistrict,
            datasets: [
              {
                label: "CLOSED",
                data: labelsDistrict.map((d) => districtData[d].onair),
                backgroundColor: "#10B981",
              },
              {
                label: "OPEN",
                data: labelsDistrict.map((d) => districtData[d].open),
                backgroundColor: "#3B82F6",
              },
              {
                label: "KENDALA",
                data: labelsDistrict.map((d) => districtData[d].kendala),
                backgroundColor: "#F59E0B",
              },
              {
                label: "DROP",
                data: labelsDistrict.map((d) => districtData[d].drop),
                backgroundColor: "#EF4444",
              },
            ],
          },
          options: {
            indexAxis: "y",
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: {
                position: "top",
                labels: { usePointStyle: true, color: textColor },
              },
            },
            scales: {
              x: {
                stacked: true,
                grid: { color: gridColor },
                ticks: { color: textColor },
              },
              y: {
                stacked: true,
                grid: { display: false },
                ticks: { color: textColor },
              },
            },
          },
        });
      }
    </script>
  </body>
</html>
